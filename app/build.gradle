plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    // 1. Ativa o Google Services (necessário para o Firebase)
    id 'com.google.gms.google-services'
}

android {
    namespace 'com.horizontenews.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.horizontenews.app"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    implementation 'androidx.cardview:cardview:1.0.0'

    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'

    implementation 'com.squareup.retrofit2:retrofit:2.9.0'
    implementation 'com.squareup.retrofit2:converter-gson:2.9.0'
    implementation 'com.github.bumptech.glide:glide:4.16.0'
    implementation 'org.jsoup:jsoup:1.17.2'

    // Firebase BoM (Bill of Materials) - Gerencia as versões automaticamente
    implementation platform('com.google.firebase:firebase-bom:32.7.0')
    
    // Firebase Analytics (já estava no seu código)
    implementation 'com.google.firebase:firebase-analytics-ktx'
    
    // NOVA LINHA: Ativa as Notificações do Horizonte News
    implementation 'com.google.firebase:firebase-messaging-ktx'
}